# 提交后自动检查（评估 AI 的产出）
# push / PR 触发 → 装依赖 → ruff lint → pytest 测试。任一红，PR 就进不了主干。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: 测试 (pytest)
        run: pytest -q

# ──────────────────────────────────────────────────────────────────────────
# 换语言只改"装依赖 + 检查"两步，链条结构不变：
#   TypeScript/JS : npm ci  →  npx eslint . && npm test
#   Go            : -        →  golangci-lint run && go test ./...
#   Rust          : -        →  cargo clippy -- -D warnings && cargo test
#   Java          : -        →  mvn -q test          # checkstyle/spotless 可并入
# 配合仓库设置里的 Branch protection：把 CI 设为 required check，红就不让 merge。
